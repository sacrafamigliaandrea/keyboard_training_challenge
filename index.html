<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyboard Training Challenge · Scuola Sacra Famiglia</title>
<link rel="icon" href="logo.svg">
<link rel="apple-touch-icon" href="logo.png">
<style>
:root{
  /* Tema Apple white */
  --bg:#f5f5f7; --bg2:#fbfbfd; --card:#ffffff; --panel:#f5f5f7;
  --ink:#1d1d1f; --muted:#6e6e73; --faint:#a1a1a6; --line:#d2d2d7;
  --blue:#0071e3; --blue2:#2997ff; --blueD:#0058b0; --blueL:rgba(0,113,227,.10);
  --amber:#b8860b; --amber2:#d4a017; --amberL:rgba(184,134,11,.12);
  --green:#1d8a4e; --greenL:#e8f6ee;
  --shadow:0 4px 24px rgba(0,0,0,.06);
  --shadow2:0 12px 40px rgba(0,0,0,.12);
  --sys:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Helvetica,Arial,sans-serif;
  --mono:"SF Mono",ui-monospace,"Menlo","Monaco",monospace;
  /* Zone dita (pastello, nessun rosso) */
  --zL5:#f5b784; --zL4:#f3ce7e; --zL3:#cde28c; --zL2:#9bd9a6;
  --zR2:#8fd3da; --zR3:#9bbdf0; --zR4:#b3a6f0; --zR5:#d9a6f0; --zTh:#c7c7cc;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;width:100vw;height:100vh;overflow:hidden}
body{font-family:var(--sys);background:var(--bg);color:var(--ink);
  -webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
button{font-family:inherit}
svg{display:block}

/* ---------- BRAND ---------- */
.brand{display:inline-flex;align-items:center;gap:11px}
.brand-mark{width:40px;height:40px;flex:0 0 auto;border-radius:11px}
.brand-txt{display:flex;flex-direction:column;text-align:left;line-height:1.18}
.brand-name{font-size:14px;font-weight:700;letter-spacing:.3px;color:var(--ink)}
.brand-role{font-size:11.5px;font-weight:500;letter-spacing:.2px;color:var(--muted)}

/* ---------- LOGIN ---------- */
#loginScreen{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(120% 120% at 50% -10%,#ffffff 0%,#ececed 60%,#e4e4e7 100%);padding:24px}
.login-modal{background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);border:1px solid rgba(0,0,0,.06);
  padding:38px 40px 34px;border-radius:28px;box-shadow:var(--shadow2);width:560px;max-width:100%;text-align:center}
.login-brand{display:flex;justify-content:center;margin-bottom:18px}
.login-title{font-size:2rem;font-weight:700;letter-spacing:-.02em;margin:2px 0 4px}
.login-sub{font-size:1rem;font-weight:400;color:var(--muted);margin:0 0 24px}
.field-lbl{display:block;text-align:left;font-size:.82rem;font-weight:600;color:var(--muted);margin:14px 2px 6px}
input,select{width:100%;padding:14px 15px;border-radius:13px;border:1px solid var(--line);
  font-size:1.02rem;font-family:inherit;color:var(--ink);outline:none;background:#fff;transition:.15s}
input::placeholder{color:var(--faint)}
input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 4px var(--blueL)}
select{appearance:none;-webkit-appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 14 14'><path d='M3 5l4 4 4-4' fill='none' stroke='%236e6e73' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/></svg>");
  background-repeat:no-repeat;background-position:right 15px center;padding-right:38px}
.btn-start{width:100%;padding:15px;margin-top:26px;background:var(--blue);color:#fff;border:none;border-radius:13px;
  font-size:1.08rem;font-weight:600;letter-spacing:.2px;cursor:pointer;transition:transform .1s,background .15s}
.btn-start:hover{background:var(--blueD)} .btn-start:active{transform:scale(.985)}

/* ---------- AVATAR (le 4 Case) ---------- */
.av{width:100%;height:100%;display:block;border-radius:50%;object-fit:cover}
.av-pick{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:2px}
.av-btn{display:flex;flex-direction:column;align-items:center;gap:7px;padding:10px 4px 8px;
  border-radius:16px;border:2px solid transparent;background:#fff;
  cursor:pointer;transition:transform .12s,border-color .12s,box-shadow .12s}
.av-btn .av{width:64px;height:64px}
.av-btn .avn{font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:.2px}
.av-btn:hover{transform:scale(1.05)}
.av-btn.sel{border-color:var(--blue);box-shadow:0 0 0 3px var(--blueL)}
.av-btn.sel .avn{color:var(--blue)}
.profile-card{display:flex;align-items:center;gap:11px}
.pav{width:38px;height:38px;flex:0 0 auto}
.pnick{font-weight:700;font-size:.98rem}
.pcls{font-size:.76rem;color:var(--muted);font-weight:600}
.board-row .bav{width:24px;height:24px;flex:0 0 auto}

/* ---------- APP ---------- */
#appContainer{display:none;height:100vh;width:100vw;grid-template-columns:1fr 380px}
.game-zone{position:relative;display:flex;flex-direction:column;padding:16px 34px 20px;
  border-right:1px solid var(--line);min-width:0;background:var(--bg2)}
.topbar{display:flex;align-items:center;justify-content:space-between;flex:none;height:44px}
.chip{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line);
  border-radius:20px;padding:7px 13px;font-size:.86rem;font-weight:600;color:var(--ink);cursor:pointer;
  transition:.12s;box-shadow:var(--shadow)}
.chip:hover{border-color:var(--blue);color:var(--blue)}
.chip svg{width:16px;height:16px}
.chip.muted{color:var(--muted)}
.audio-wrap{display:flex;align-items:center;gap:8px}
.track-select{width:150px;padding:8px 30px 8px 12px;border-radius:20px;font-size:.84rem;font-weight:600;
  border:1px solid var(--line);background:var(--card);box-shadow:var(--shadow)}

.header-display{flex:none;text-align:center;margin:4px 0 2px}
.topic-title{font-size:1.5rem;font-weight:700;letter-spacing:-.02em;margin:6px 0 2px;color:var(--ink)}
.dish-name{display:inline-flex;align-items:center;gap:9px;font-size:1rem;font-weight:600;color:var(--muted);min-height:1.4em}
.dish-name .ic{width:20px;height:20px;color:var(--blue)}

.stage{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;gap:14px;align-items:center}
.phrase-container{width:100%;max-width:900px;background:var(--card);border:1px solid var(--line);
  border-radius:20px;box-shadow:var(--shadow);padding:26px 32px;min-height:120px;
  display:flex;align-items:center;justify-content:flex-start}
.text-wrapper{width:100%;white-space:pre-wrap;word-break:break-word;font-family:var(--mono);
  font-size:1.7rem;font-weight:500;line-height:1.55;letter-spacing:.02em;text-align:left}
.text-done{color:var(--blue)}
.text-todo{color:#c7c7cc}
.text-next{color:var(--ink);background:var(--blueL);border-radius:4px;padding:0 1px}
.text-cursor{display:inline-block;width:2px;height:1.35em;background:var(--blue);vertical-align:text-bottom;
  border-radius:2px;animation:blink 1.05s steps(1) infinite;margin:0 1px}
@keyframes blink{50%{opacity:0}}

/* Glossario (scaffolding per i termini tecnici della frase) */
.glossary{width:100%;max-width:900px;display:flex;align-items:flex-start;gap:10px;
  background:var(--blueL);border:1px solid rgba(0,113,227,.22);border-radius:14px;
  padding:10px 16px;font-size:.95rem;line-height:1.45;color:var(--ink);margin-top:-4px}
.glossary svg{width:18px;height:18px;color:var(--blue);flex:0 0 auto;margin-top:2px}
.glossary .glb{font-weight:700;color:var(--blue);letter-spacing:.4px;margin-right:6px}

/* Mani (SVG dorso, dita evidenziabili) */
.hands{display:flex;justify-content:center;gap:52px;align-items:flex-end;height:108px}
.hand-svg{height:108px;width:auto;filter:drop-shadow(0 6px 12px rgba(0,0,0,.10))}
.hand-svg .hskin{fill:#EFE6DC;stroke:#D8CCBF;stroke-width:2;stroke-linejoin:round}
.hand-svg .hknuckle{stroke:#DCCFC1;stroke-width:1.6;fill:none;stroke-linecap:round}
.hand-svg .fg{stroke:transparent;fill:none;stroke-linecap:round;transition:stroke .1s}
.hand-svg .fg.on{stroke:var(--c);animation:fpulse 1.1s ease-in-out infinite}
@keyframes fpulse{0%,100%{opacity:.95}50%{opacity:.5}}

/* ---------- TASTIERA (Magic Keyboard ISO) ---------- */
.kbd-wrap{background:linear-gradient(#f6f7f9,#dcdee2);border:1px solid #cbcdd3;border-radius:16px;
  padding:11px;box-shadow:0 18px 34px rgba(0,0,0,.14),inset 0 1px 2px rgba(255,255,255,.7);
  display:flex;flex-direction:column;gap:6px;width:100%;max-width:920px}
.krow{display:flex;gap:6px;height:46px}
.krow.f{height:32px}
.key{position:relative;flex:1;background:linear-gradient(#ffffff,#eceef1);border:1px solid #c9cbd1;
  border-bottom-width:2px;border-radius:8px;color:#2a2a2e;font-weight:500;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:default;user-select:none;overflow:hidden;transition:transform .05s,box-shadow .08s,background .08s}
.krow.f .key{border-radius:6px}
.key .mn{font-size:.98rem;font-weight:500}
.key .sub{position:absolute;top:3px;left:6px;font-size:.56rem;color:var(--faint);font-family:var(--mono)}
.key .glyph{font-size:.9rem}
.key .glyph.tiny{font-size:.6rem}
.key .lbl{font-size:.62rem;color:#3a3a3e}
.key .word{font-size:.44rem;color:var(--faint);text-transform:lowercase;margin-top:1px;font-weight:600}
.key .fic{width:16px;height:16px;color:#3a3a3e}
.key.al-s{align-items:flex-start;padding-left:9px}
.key.al-e{align-items:flex-end;padding-right:9px}
/* zone tint (barra inferiore colorata sul keycap) */
.key.z-L5{box-shadow:inset 0 -3px 0 var(--zL5)} .key.z-L4{box-shadow:inset 0 -3px 0 var(--zL4)}
.key.z-L3{box-shadow:inset 0 -3px 0 var(--zL3)} .key.z-L2{box-shadow:inset 0 -3px 0 var(--zL2)}
.key.z-R2{box-shadow:inset 0 -3px 0 var(--zR2)} .key.z-R3{box-shadow:inset 0 -3px 0 var(--zR3)}
.key.z-R4{box-shadow:inset 0 -3px 0 var(--zR4)} .key.z-R5{box-shadow:inset 0 -3px 0 var(--zR5)}
.key.z-Th{box-shadow:inset 0 -3px 0 var(--zTh)}
/* stati */
.key.hint{background:linear-gradient(var(--blue2),var(--blue));color:#fff;border-color:var(--blueD);
  box-shadow:0 0 0 3px var(--blueL),0 6px 14px rgba(0,113,227,.35);transform:translateY(-1px);z-index:3}
.key.hint .mn,.key.hint .glyph,.key.hint .lbl,.key.hint .sub,.key.hint .word,.key.hint .fic{color:#fff}
.key.press{transform:translateY(1px);background:linear-gradient(#e9edf3,#dde2ea)}
.key.armed{background:linear-gradient(var(--blue2),var(--blue));color:#fff;border-color:var(--blueD)}
.key.armed .glyph,.key.armed .mn,.key.armed .lbl,.key.armed .word,.key.armed .sub{color:#fff}
/* frecce */
.arrows{display:flex;flex-direction:column;justify-content:flex-end;gap:2px;flex:2}
.arr-r{display:flex;gap:3px;flex:1}
.arr{flex:1;background:linear-gradient(#ffffff,#eceef1);border:1px solid #c9cbd1;border-bottom-width:2px;
  border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#3a3a3e}
.arr.blank{background:none;border:none}
.arr.half{max-height:50%}

/* Legenda dita */
.legend{flex:none;display:flex;flex-wrap:wrap;gap:6px 14px;justify-content:center;margin-top:6px}
.legend span{display:inline-flex;align-items:center;gap:5px;font-size:.72rem;color:var(--muted);font-weight:600}
.legend i{width:11px;height:11px;border-radius:3px;display:inline-block}

/* ---------- SIDEBAR ---------- */
.sidebar{background:var(--card);display:flex;flex-direction:column;gap:14px;padding:20px;overflow-y:auto}
.card-lite{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px 16px}
.score-card{display:flex;align-items:center;justify-content:space-around;padding:14px 16px;text-align:center}
.score-num{font-size:2.1rem;font-weight:700;letter-spacing:-.02em;color:var(--blue);line-height:1}
.score-lbl{font-size:.72rem;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-top:4px}
.score-done{font-size:2.1rem;font-weight:700;letter-spacing:-.02em;color:var(--ink);line-height:1}
.sec-lbl{font-size:.72rem;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
/* Grado */
.rank-line{display:flex;align-items:center;justify-content:space-between;gap:8px}
.rank-badge{display:inline-flex;align-items:center;gap:8px;font-size:1.05rem;font-weight:700;color:var(--ink)}
.rank-badge svg{width:20px;height:20px;color:var(--amber2)}
.rank-next{font-size:.78rem;font-weight:600;color:var(--muted)}
.rank-bar{height:8px;border-radius:5px;background:#e5e5ea;margin-top:10px;overflow:hidden}
.rank-bar i{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,var(--amber),var(--amber2));
  width:0;transition:width .5s ease}
/* Classifica */
.board-card{flex:1;min-height:160px;display:flex;flex-direction:column}
.board-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:5px}
.board-row{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);
  border-radius:10px;padding:7px 10px;font-size:.88rem}
.board-row .pos{width:20px;text-align:center;font-weight:700;color:var(--muted);flex:0 0 auto}
.board-row .bnick{flex:1;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.board-row .bpts{font-weight:700;color:var(--blue);flex:0 0 auto}
.board-row .bdone{font-size:.74rem;color:var(--muted);flex:0 0 auto}
.board-row.me{border-color:var(--blue);background:var(--blueL)}
.board-row.top .pos{color:var(--amber2)}
.board-empty{font-size:.85rem;color:var(--muted);line-height:1.5;padding:6px 2px}
.board-live{display:inline-flex;align-items:center;gap:6px}
.board-live i{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;animation:fpulse 1.6s infinite}
/* Toast promozione */
.toast{position:absolute;top:84px;left:50%;transform:translateX(-50%) translateY(-8px);z-index:50;
  background:var(--ink);color:#fff;border-radius:16px;padding:13px 22px;display:flex;align-items:center;gap:10px;
  font-weight:600;box-shadow:var(--shadow2);opacity:0;pointer-events:none;transition:opacity .3s,transform .3s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast svg{width:20px;height:20px;color:var(--amber2)}
.btn-ninja{width:100%;padding:13px;background:var(--ink);color:#fff;border:none;border-radius:13px;
  font-size:.96rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:.12s}
.btn-ninja:hover{background:#000} .btn-ninja svg{width:18px;height:18px}

/* ---------- NINJA ---------- */
#ninjaApp{display:none;height:100vh;width:100vw;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(120% 120% at 50% 0%,#1c1c1e 0%,#0c0c0e 100%);color:#fff;position:relative}
.ninja-wrap{width:92%;max-width:1000px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:18px}
.ninja-lvl{font-size:.8rem;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:#8e8e93}
.ninja-lvl b{color:var(--blue2)}
.ninja-q{font-size:2.6rem;font-weight:700;letter-spacing:-.02em;margin:4px 0}
.ninja-hint{font-size:.95rem;color:#98989d;margin-top:-6px}
.ninja-combo{display:flex;gap:10px;justify-content:center;min-height:56px;align-items:center;flex-wrap:wrap}
.combo-key{background:#2c2c2e;color:#fff;border:1px solid #48484a;border-radius:11px;
  padding:12px 20px;font-weight:600;font-size:1.2rem;min-width:54px}
.combo-plus{color:#636366;font-size:1.4rem;font-weight:700}
.combo-ph{color:#48484a;font-size:.95rem}
.ninja-q.ok{color:#30d158} .ninja-q.warn{color:var(--amber2);animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
#kbdNinja.kbd-wrap{background:linear-gradient(#3a3a3c,#1c1c1e);border-color:#000;
  box-shadow:0 24px 50px rgba(0,0,0,.6)}
#kbdNinja .key{background:linear-gradient(#48484a,#333335);border-color:#000;color:#f2f2f7;cursor:pointer}
#kbdNinja .key .sub,#kbdNinja .key .word,#kbdNinja .key .lbl{color:#98989d}
#kbdNinja .key .fic{color:#c7c7cc}
#kbdNinja .key:hover{background:linear-gradient(#5a5a5c,#3a3a3c)}
#kbdNinja .arr{background:linear-gradient(#48484a,#333335);border-color:#000;color:#c7c7cc}
.btn-back{position:absolute;top:22px;left:22px;background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.18);
  padding:9px 15px;border-radius:20px;font-weight:600;font-size:.88rem;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
.btn-back:hover{background:rgba(255,255,255,.18)} .btn-back svg{width:15px;height:15px}
.hidden{display:none!important}
</style>
</head>
<body>

<audio id="bgMusic" loop><source id="audioSrc" src="" type="audio/mpeg"></audio>

<!-- ==================== LOGIN ==================== -->
<div id="loginScreen">
  <div class="login-modal">
    <div class="login-brand" id="loginBrand"></div>
    <div class="login-title">Keyboard Training Challenge</div>

    <label class="field-lbl" for="nameInput">Il tuo nickname</label>
    <input type="text" id="nameInput" placeholder="Inventa un nickname…" autocomplete="off" maxlength="14">

    <label class="field-lbl">La tua Casa</label>
    <div class="av-pick" id="avPick"></div>

    <label class="field-lbl" for="classSelect">La tua classe</label>
    <select id="classSelect">
      <option value="" disabled selected>Seleziona la classe…</option>
      <optgroup label="Primaria (STAMPATO MAIUSCOLO)">
        <option value="1AP">1A Primaria</option><option value="1BP">1B Primaria</option>
        <option value="2AP">2A Primaria</option><option value="2BP">2B Primaria</option>
      </optgroup>
      <optgroup label="Primaria (minuscolo)">
        <option value="3AP">3A Primaria</option><option value="3BP">3B Primaria</option>
        <option value="4AP">4A Primaria</option><option value="4BP">4B Primaria</option>
        <option value="5AP">5A Primaria</option><option value="5BP">5B Primaria</option>
      </optgroup>
      <optgroup label="Secondaria (testi avanzati)">
        <option value="1AS">1A Secondaria</option><option value="1BS">1B Secondaria</option><option value="1CS">1C Secondaria</option>
        <option value="2AS">2A Secondaria</option><option value="2BS">2B Secondaria</option><option value="2CS">2C Secondaria</option>
        <option value="3AS">3A Secondaria</option><option value="3BS">3B Secondaria</option><option value="3CS">3C Secondaria</option>
      </optgroup>
    </select>

    <label class="field-lbl" for="topicSelect">La tua passione</label>
    <select id="topicSelect">
      <option value="" disabled selected>Scegli l'argomento…</option>
      <option value="cucina">Cucina e ricette tipiche</option>
      <option value="basket">Basket e NBA</option>
      <option value="pesca">Pesca e natura</option>
      <option value="calcio">Champions League</option>
      <option value="ippica">Cavalli e ippica</option>
      <option value="nerd">Tecnologia e gaming</option>
      <option value="viaggi">Viaggi in Italia</option>
      <option value="volley">Pallavolo nazionale</option>
      <option value="gym">Ginnastica artistica</option>
      <option value="moto">Motori e motocross</option>
      <option value="music">Strumenti musicali</option>
    </select>

    <button class="btn-start" onclick="avviaSuite()">Inizia l'addestramento</button>
  </div>
</div>

<!-- ==================== APP ==================== -->
<div id="appContainer">
  <div class="game-zone">
    <div class="toast" id="toast"></div>
    <div class="topbar">
      <div class="audio-wrap">
        <button class="chip muted" id="musicBtn" onclick="toggleMusic()"><span id="musicIcon"></span><span id="musicLbl">Musica</span></button>
        <select id="trackSelect" class="track-select" onchange="cambiaTraccia(this)">
          <option value="0">Command</option><option value="1">La Collina</option><option value="2">Bag Raiders</option><option value="3">Pink · Try</option>
        </select>
        <button class="chip" id="sndBtn" onclick="toggleSnd()"><span id="sndIcon"></span><span id="sndLbl">Suoni attivi</span></button>
      </div>
      <div id="appBrand"></div>
      <button class="chip" onclick="esciLogin()"><span id="exitIcon"></span>Esci</button>
    </div>

    <div class="header-display">
      <div id="topicTitle" class="topic-title">Caricamento…</div>
      <div id="dishName" class="dish-name"></div>
    </div>

    <div class="stage">
      <div class="phrase-container"><div id="phraseText" class="text-wrapper"></div></div>

/* ============ SUONI (WebAudio sintetizzati, zero file esterni) ============ */
let sndOn = true, AC = null;
function ac(){
  if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; } }
  if(AC && AC.state==='suspended') AC.resume();
  return AC;
}
function sndKey(){ // click meccanico: burst di rumore filtrato + "thock" basso
  if(!sndOn) return; const a=ac(); if(!a) return; const t=a.currentTime;
  const len=Math.floor(a.sampleRate*0.03), buf=a.createBuffer(1,len,a.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2);
  const src=a.createBufferSource(); src.buffer=buf;
  const f=a.createBiquadFilter(); f.type='bandpass'; f.frequency.value=2300; f.Q.value=.9;
  const g=a.createGain(); g.gain.setValueAtTime(.5,t); g.gain.exponentialRampToValueAtTime(.001,t+.03);
  src.connect(f); f.connect(g); g.connect(a.destination); src.start(t);
  const o=a.createOscillator(), g2=a.createGain(); o.type='sine';
  o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(85,t+.045);
  g2.gain.setValueAtTime(.16,t); g2.gain.exponentialRampToValueAtTime(.001,t+.05);
  o.connect(g2); g2.connect(a.destination); o.start(t); o.stop(t+.06);
}
function tone(freq,dt,dur,vol){
  const a=ac(); if(!a) return; const t=a.currentTime+dt;
  const o=a.createOscillator(), g=a.createGain(); o.type='sine'; o.frequency.value=freq;
  g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+.02);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+dur+.05);
}
function sndMiss(){ if(sndOn) tone(140,0,.09,.05); }
function sndDone(){ if(sndOn){ tone(660,0,.16,.12); tone(880,.13,.24,.12); } }
function sndRank(){ if(sndOn) [523,659,784,1047].forEach(function(f,i){ tone(f,i*.11,.2,.13); }); }

  // e fa fallire la richiesta con una pagina d'errore prima di arrivare allo script.

  new Image().src = LB_URL+'?'+q.toString(); // image-pixel GET: CSP-safe, niente CORS
}
function lbPoll(){
  if(!LB_URL){ renderBoard(null); return; }
  fetch(LB_URL+'?'+new URLSearchParams({action:'board',topic:st.topic,day:dayStr()}))
    .then(function(r){ return r.json(); })
    .then(function(j){ renderBoard(j && j.ok ? j.rows : null); })
    .catch(function(){ renderBoard(null); });
}
function renderBoard(rows){
  const el=document.getElementById('boardList');
  if(!rows){
    el.innerHTML = '<div class="board-empty">'+(LB_URL
      ? 'Connessione alla classifica…'
      : 'La classifica si attiva quando il prof collega il foglio dei punteggi.')+'</div>';
    return;
  }
  if(!rows.length){ el.innerHTML='<div class="board-empty">In questo momento sei il primo sul pool di oggi: chi inizia ora apparirà qui.</div>'; return; }
  el.innerHTML = rows.map(function(r,i){
    const me = r[3]===SESSION_ID;
    return '<div class="board-row'+(me?' me':'')+(i===0?' top':'')+'">'+
      '<span class="pos">'+(i+1)+'</span>'+
      '<span class="bav">'+avatarImg(r[4])+'</span>'+
      '<span class="bnick">'+esc(r[0])+(me?' · tu':'')+'</span>'+
      '<span class="bdone">'+r[2]+' frasi</span>'+
      '<span class="bpts">'+r[1]+'</span></div>';
  }).join('');
}
let lbTimers=[];
function lbStart(){
  lbTimers.forEach(clearInterval); lbTimers=[];
  lbPush(); lbPoll();
  if(LB_URL){
    lbTimers.push(setInterval(lbPush,LB_PUSH_MS));
    lbTimers.push(setInterval(lbPoll,LB_POLL_MS));
  }
}

// id -> zona (fonte unica per il dito)
const ID_ZONE = {};
KB.forEach(r=>r.keys.forEach(k=>{ if(k.id && k.z) ID_ZONE[k.id]=k.z; }));

// char -> {key, shift}
const CHAR_KEY = {};
"abcdefghijklmnopqrstuvwxyz".split('').forEach(c=>{ CHAR_KEY[c]={key:c.toUpperCase()}; CHAR_KEY[c.toUpperCase()]={key:c.toUpperCase(),shift:true}; });
Object.assign(CHAR_KEY,{
  'à':{key:'Agrave'},'è':{key:'Egrave'},'é':{key:'Egrave',shift:true},
  'ì':{key:'Igrave'},'ò':{key:'Ograve'},'ù':{key:'Ugrave'},
  'À':{key:'Agrave',shift:true},'È':{key:'Egrave',shift:true},'É':{key:'Egrave',shift:true},
  'Ì':{key:'Igrave',shift:true},'Ò':{key:'Ograve',shift:true},'Ù':{key:'Ugrave',shift:true},
  '.':{key:'Dot'},',':{key:'Comma'},"'":{key:'Apostrophe'},'-':{key:'Minus'},' ':{key:'Space'},
  '0':{key:'0'},'1':{key:'1'},'2':{key:'2'},'3':{key:'3'},'4':{key:'4'},
  '5':{key:'5'},'6':{key:'6'},'7':{key:'7'},'8':{key:'8'},'9':{key:'9'}
});
function charInfo(ch){
  const m = CHAR_KEY[ch]; if(!m) return null;
  if(m.key==='Space') return {key:'Space',keys:['Space'],fingers:['L1','R1']};
  const keys=[m.key], fingers=[], z=ID_ZONE[m.key];
  if(z) fingers.push(z);
  if(m.shift){
    if(z && z.charAt(0)==='L'){ keys.push('ShiftR'); fingers.push('R5'); }
    else { keys.push('ShiftL'); fingers.push('L5'); }
  }
  return {key:m.key,keys:keys,fingers:fingers};
}

/* ============ RENDER TASTIERA ============ */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function buildKeyboard(id,opts){
  opts = opts||{};
  let html='';
  KB.forEach(r=>{
    html += '<div class="krow '+(r.row==='f'?'f':'')+'">';
    r.keys.forEach(k=>{
      if(k.arrows){ html += arrowsHTML(opts.interactive); return; }
      let inner='';
      if(k.icon) inner='<span class="fic">'+svg(k.icon,'fic')+'</span>';
      else if(k.glyph!==undefined) inner='<span class="glyph'+(k.tiny?' tiny':'')+'">'+esc(k.glyph)+'</span>';
      else if(k.mn!==undefined) inner=(k.sub!==undefined?'<span class="sub">'+esc(k.sub)+'</span>':'')+'<span class="mn">'+esc(k.mn)+'</span>';
      else if(k.lbl!==undefined) inner='<span class="lbl">'+esc(k.lbl)+'</span>';
      if(k.word) inner+='<span class="word">'+esc(k.word)+'</span>';
      let cls='key';
      if(k.al==='s') cls+=' al-s'; else if(k.al==='e') cls+=' al-e';
      if(opts.zones && k.z) cls+=' z-'+k.z;
      const click = opts.interactive ? ' onclick="ninjaPress(\''+k.id+'\')"' : '';
      html += '<div class="'+cls+'" style="flex:'+(k.flex||1)+'" data-k="'+esc(k.id)+'"'+click+'>'+inner+'</div>';
    });
    html += '</div>';
  });
  document.getElementById(id).innerHTML = html;
}
function arrowsHTML(interactive){
  const c=function(k){return interactive?' onclick="ninjaPress(\''+k+'\')"':'';};
  return '<div class="arrows">'
    +'<div class="arr-r half"><div class="arr blank"></div>'
    +'<div class="arr" data-k="Up"'+c('Up')+'>▲</div><div class="arr blank"></div></div>'
    +'<div class="arr-r"><div class="arr" data-k="Left"'+c('Left')+'>◀</div>'
    +'<div class="arr" data-k="Down"'+c('Down')+'>▼</div>'
    +'<div class="arr" data-k="Right"'+c('Right')+'>▶</div></div></div>';
}

/* ============ DATABASE FRASI ============ */
function generateDB(topic, level){
  // level 'base' = classi 1-2 primaria (frasi corte); 'std' = tutti gli altri
  const src = level==='base' ? premiumBase : premiumPhrases;
  const pr = src[topic]||src.cucina;
  const sg = semantics[topic]||semantics.cucina;
  const db = pr.slice();
  // PRNG seedato giorno+topic+livello: stesso pool per chi è allo stesso livello
  const rand = mulberry32(hashStr(dayStr()+'|'+topic+'|'+(level||'std')));
  for(let i=db.length;i<200;i++){
    const g = sg[Math.floor(rand()*sg.length)];
    const s = g.s[Math.floor(rand()*g.s.length)];
    const v = g.v[Math.floor(rand()*g.v.length)];
    const c = g.c[Math.floor(rand()*g.c.length)];
    db.push({n:"Allenamento "+(i+1),t:s+" "+v+" "+c,l:g.l,lat:g.lat,lon:g.lon});
  }
  return db;
}

function caricaEsercizio(){
  const r = st.db[st.idx % st.db.length];
  let frase = r.t;
  if(st.isSec){ if(st.idx>=st.nPremium) frase = frase.replace(/\.$/,", perché è importante."); }
  else if(st.caps){ frase = frase.toUpperCase(); }

  st.fullText = frase;
  st.typed = "";

  const conf = topicsConfig[st.topic];
  document.getElementById('dishName').innerHTML =
    svg(conf.icon,'ic')+'<span>'+esc(r.n)+'</span>'+
    '<span style="color:var(--faint)">·</span>'+svg('pin','ic')+'<span>'+esc(r.l)+'</span>';

  // Glossario: visibile solo se la frase ha un termine tecnico da spiegare
  const glossary = document.getElementById('glossary');
  if(r.g){
    const gtxt = st.caps ? r.g.toUpperCase() : r.g;
    glossary.innerHTML = svg('book')+'<span><span class="glb">'+(st.caps?'GLOSSARIO':'Glossario')+'</span>'+esc(gtxt)+'</span>';
    glossary.classList.remove('hidden');
  } else {
    glossary.classList.add('hidden');
  }

  aggiornaDisplay();
  aggiornaVisivo();
}

function aggiornaDisplay(){
  const done = esc(st.fullText.substring(0, st.typed.length));
  const nextCh = st.fullText.charAt(st.typed.length);
  const todo = esc(st.fullText.substring(st.typed.length+1));
  const nextHTML = nextCh ? '<span class="text-next">'+esc(nextCh===' '?' ':nextCh)+'</span>' : '';
  document.getElementById('phraseText').innerHTML =
    '<span class="text-done">'+done+'</span><span class="text-cursor"></span>'+nextHTML+'<span class="text-todo">'+todo+'</span>';
}

function aggiornaVisivo(){
  document.querySelectorAll('.hand-svg .fg').forEach(function(f){f.classList.remove('on');});
  document.querySelectorAll('#kbdChef .key').forEach(function(k){k.classList.remove('hint');});
  const next = st.fullText.charAt(st.typed.length);
  if(!next) return;
  const info = charInfo(next);
  if(!info) return;
  info.fingers.forEach(function(f){ const el=document.getElementById('ov-'+f); if(el) el.classList.add('on'); });
  info.keys.forEach(function(kid){
    const el=document.querySelector('#kbdChef .key[data-k="'+kid+'"]'); if(el) el.classList.add('hint');
  });
}

function handleGlobalKey(e){
  if(document.getElementById('appContainer').style.display==='none') return;
  if(document.getElementById('ninjaApp').style.display==='flex') return;
  if(e.key==='Shift'||e.key==='CapsLock'||e.key==='Control'||e.key==='Alt'||e.key==='Meta') return;
  if(e.key===' ') e.preventDefault();

  const char = st.fullText.charAt(st.typed.length);
  if(!char) return;
  const match = e.key===char || (st.caps && e.key.length===1 && e.key.toUpperCase()===char);
  if(!match){ if(e.key.length===1) sndMiss(); return; }

  sndKey();
  st.typed += char;
  const info = charInfo(char);
  if(info){ const k=document.querySelector('#kbdChef .key[data-k="'+info.key+'"]');
    if(k){ k.classList.add('press'); setTimeout(function(){k.classList.remove('press');},110); } }

  aggiornaDisplay();
  if(st.typed.length===st.fullText.length){
    const prevRank = rankIdx(st.score);
    st.score += st.fullText.length*10;
    st.done++;
    document.getElementById('scoreNum').textContent = st.score;
    document.getElementById('doneNum').textContent = st.done;
    updateRankUI();
    const newRank = rankIdx(st.score);
    if(newRank>prevRank){
      sndRank();
      showToast(svg('medal')+'<span>Nuovo grado: <b>'+RANKS[newRank].n+'</b></span>');
    } else {
      sndDone();
    }
    lbPush();
    st.idx++;
    setTimeout(caricaEsercizio, 620);
  } else {
    aggiornaVisivo();
  }
}

/* ============ MUSICA ============ */
function toggleMusic(){
  const m=document.getElementById('bgMusic');
  if(m.paused){ m.play().catch(function(){}); isPlaying=true;
    document.getElementById('musicIcon').innerHTML=svg('soundOn');
    document.getElementById('musicLbl').textContent='In riproduzione';
    document.getElementById('musicBtn').classList.remove('muted');
  } else { m.pause(); isPlaying=false;
    document.getElementById('musicIcon').innerHTML=svg('soundOff');
    document.getElementById('musicLbl').textContent='Musica';
    document.getElementById('musicBtn').classList.add('muted');
  }
  document.getElementById('musicBtn').blur();
}
function cambiaTraccia(sel){
  sel.blur();
  const m=document.getElementById('bgMusic'); m.src=playlist[sel.value];
  if(isPlaying) m.play().catch(function(){});
}

/* ============ NINJA ============ */
const GLYPH = {Cmd:'⌘',ShiftL:'⇧',ShiftR:'⇧',Opt:'⌥',Ctrl:'⌃',Space:'spazio',Tab:'⇥ tab'};
function goToNinja(){
  document.getElementById('appContainer').style.display='none';
  document.getElementById('ninjaApp').style.display='flex';
  nj.lvl=0; loadNinjaLvl(0);
}
function backToMain(){
  document.getElementById('ninjaApp').style.display='none';
  document.getElementById('appContainer').style.display='grid';
}
function loadNinjaLvl(idx){
  if(idx>=ninjaLevels.length){ document.getElementById('ninjaQuestion').textContent="Completato!"; document.getElementById('ninjaCombo').innerHTML=''; return; }
  nj.lvl=idx; nj.qIdx=0;
  document.getElementById('ninjaLevel').textContent=ninjaLevels[idx].name;
  askNinja();
}
function askNinja(){
  const lvl=ninjaLevels[nj.lvl];
  if(nj.qIdx>=lvl.qs.length){ loadNinjaLvl(nj.lvl+1); return; }
  nj.currentQ=lvl.qs[nj.qIdx]; nj.input=[];
  const q=document.getElementById('ninjaQuestion'); q.className='ninja-q'; q.textContent=nj.currentQ.n;
  document.querySelectorAll('#kbdNinja .key').forEach(function(k){k.classList.remove('armed');});
  renderCombo();
}
function ninjaPress(id){
  sndKey();
  const i=nj.input.indexOf(id);
  if(i>=0) nj.input.splice(i,1); else nj.input.push(id);
  document.querySelectorAll('#kbdNinja [data-k]').forEach(function(el){
    el.classList.toggle('armed', nj.input.indexOf(el.dataset.k)>=0);
  });
  renderCombo();
  if(nj.input.length===nj.currentQ.k.length){
    const ok = nj.currentQ.k.every(function(k){return nj.input.indexOf(k)>=0;});
    const q=document.getElementById('ninjaQuestion');
    if(ok){ q.className='ninja-q ok'; q.textContent='Corretto!'; sndDone();
      setTimeout(function(){nj.qIdx++; askNinja();},850);
    } else { q.className='ninja-q warn'; sndMiss();
      setTimeout(function(){ nj.input=[]; askNinja(); },850);
    }
  }
}
function renderCombo(){
  const div=document.getElementById('ninjaCombo');
  if(!nj.currentQ){ div.innerHTML=''; return; }
  if(nj.input.length===0){ div.innerHTML='<span class="combo-ph">Componi la scorciatoia…</span>'; return; }
  div.innerHTML = nj.input.map(function(k,i){
    const lbl = GLYPH[k] ? GLYPH[k]+' '+(k.indexOf('Shift')===0?'':k==='Space'||k==='Tab'?'':k) : k;
    const clean = GLYPH[k] ? (k==='Cmd'?'⌘ cmd':k.indexOf('Shift')===0?'⇧ maiusc':k==='Opt'?'⌥ alt':k==='Ctrl'?'⌃ ctrl':GLYPH[k]) : k;
    return (i>0?'<span class="combo-plus">+</span>':'')+'<span class="combo-key">'+esc(clean)+'</span>';
  }).join('');
}

/* ============ INIT ============ */
initIcons();
